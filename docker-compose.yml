version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - UPLOAD_DIR=/app/uploads
    volumes:
      - apk_uploads:/app/uploads
      - ./shared:/app/shared:ro
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: worker/docker/Dockerfile
    command: ["node", "dist/worker/src/index.js"]
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - APK_OUTPUT_DIR=/app/uploads
    volumes:
      - apk_uploads:/app/uploads
      - ./shared:/app/shared:ro
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      replicas: 2

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  redis_data:
  apk_uploads:
